name: Generate GitHub Metrics

on:
  # Rigjenerohet çdo ditë në mesnatë
  schedule:
    - cron: "0 0 * * *"
  # Mund ta nisësh manualisht nga tab-i "Actions"
  workflow_dispatch:
  # Rigjenerohet sa herë që bën push në main
  push:
    branches: ["main"]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Token-i personal (shtohet si secret METRICS_TOKEN)
          token: ${{ secrets.METRICS_TOKEN }}
          user: rigonp
          filename: github-metrics.svg
          config_timezone: Europe/Belgrade

          # Pa seksionet e paracaktuara — vetëm elementi vizual
          base: ""

          # Kalendari izometrik 3D i kontributeve (i gjithë viti)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
