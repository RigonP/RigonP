name: Generate GitHub Metrics

on:
  # Rigjenerohet çdo ditë në mesnatë
  schedule:
    - cron: "0 0 * * *"
  # Mund ta nisësh manualisht nga tab-i "Actions"
  workflow_dispatch:
  # Rigjenerohet sa herë që bën push në main
  push:
    branches: ["main"]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Token-i personal (shtohet si secret METRICS_TOKEN)
          # Krijoje si PAT classic me scope: repo, read:user, read:org
          token: ${{ secrets.METRICS_TOKEN }}
          user: rigonp
          filename: github-metrics.svg
          config_timezone: Europe/Belgrade

          # ── Blloku i statistikave (commits, stars, followers, etj.) ──
          # Zëvendëson kartën "GitHub Stats" që thyhej
          base: header

          # ── Gjuhët më të përdorura ──
          # Zëvendëson kartën "Top Languages" që thyhej
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # ── Kalendari izometrik 3D i kontributeve (i gjithë viti) ──
          # Tregon edhe streak-un aktual/më të gjatë (zëvendëson kartën "Streak")
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
