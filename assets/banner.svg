<svg width="1200" height="240" viewBox="0 0 1200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rigon Pira — Software Systems Engineer x AI and Data Science">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12141c"/>
      <stop offset="0.55" stop-color="#171a26"/>
      <stop offset="1" stop-color="#1b1030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="name" x1="80" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)"/>

  <!-- Subtle dotted grid on the right -->
  <g fill="#6366f1" opacity="0.14">
    <circle cx="820" cy="40" r="2.5"/><circle cx="860" cy="40" r="2.5"/><circle cx="900" cy="40" r="2.5"/><circle cx="940" cy="40" r="2.5"/><circle cx="980" cy="40" r="2.5"/><circle cx="1020" cy="40" r="2.5"/><circle cx="1060" cy="40" r="2.5"/><circle cx="1100" cy="40" r="2.5"/><circle cx="1140" cy="40" r="2.5"/>
    <circle cx="820" cy="80" r="2.5"/><circle cx="860" cy="80" r="2.5"/><circle cx="900" cy="80" r="2.5"/><circle cx="940" cy="80" r="2.5"/><circle cx="980" cy="80" r="2.5"/><circle cx="1020" cy="80" r="2.5"/><circle cx="1060" cy="80" r="2.5"/><circle cx="1100" cy="80" r="2.5"/><circle cx="1140" cy="80" r="2.5"/>
    <circle cx="820" cy="120" r="2.5"/><circle cx="860" cy="120" r="2.5"/><circle cx="900" cy="120" r="2.5"/><circle cx="940" cy="120" r="2.5"/><circle cx="980" cy="120" r="2.5"/><circle cx="1020" cy="120" r="2.5"/><circle cx="1060" cy="120" r="2.5"/><circle cx="1100" cy="120" r="2.5"/><circle cx="1140" cy="120" r="2.5"/>
  </g>

  <!-- Neural / node motif -->
  <g opacity="0.5" stroke="url(#accent)" stroke-width="1.4" fill="none">
    <line x1="960" y1="150" x2="1030" y2="115"/>
    <line x1="960" y1="150" x2="1030" y2="185"/>
    <line x1="1030" y1="115" x2="1110" y2="150"/>
    <line x1="1030" y1="185" x2="1110" y2="150"/>
    <line x1="1030" y1="115" x2="1030" y2="185"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="960" cy="150" r="6"/><circle cx="1030" cy="115" r="6" fill="#6366f1"/><circle cx="1030" cy="185" r="6" fill="#06b6d4"/><circle cx="1110" cy="150" r="6"/>
  </g>

  <!-- Name -->
  <text x="80" y="112" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#name)" letter-spacing="1">Rigon Pira</text>

  <!-- Subtitle -->
  <text x="82" y="152" font-family="'Fira Code', 'Courier New', monospace" font-size="21" font-weight="500" fill="#94a3b8">Software Systems Engineer</text>
  <text x="446" y="152" font-family="'Fira Code', 'Courier New', monospace" font-size="21" font-weight="700" fill="#8b5cf6">&#215; AI &amp; Data Science</text>

  <!-- Accent underline -->
  <rect x="82" y="172" width="300" height="4" rx="2" fill="url(#accent)"/>

  <!-- Bottom wave -->
  <path d="M0 210 C 200 180, 400 235, 600 210 S 1000 180, 1200 212 L 1200 240 L 0 240 Z" fill="url(#accent)" opacity="0.22"/>
  <path d="M0 222 C 220 195, 420 245, 640 222 S 1010 198, 1200 224 L 1200 240 L 0 240 Z" fill="url(#accent)" opacity="0.14"/>
</svg>
