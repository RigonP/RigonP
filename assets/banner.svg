<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rigon Pira — Software Systems Engineer and AI and Data Science">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16161e"/>
      <stop offset="55%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>

    <linearGradient id="name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="35%" stop-color="#A78BFA"/>
      <stop offset="68%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
      <animate attributeName="x1" values="0%;60%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;160%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="uline" x1="0%" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#8B5CF6"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="250" rx="18" fill="url(#bg)"/>
  <rect width="1000" height="250" rx="18" fill="url(#dots)" opacity="0.07"/>

  <!-- corner brackets -->
  <g stroke="#8B5CF6" stroke-width="2" opacity="0.5" fill="none">
    <path d="M24 24 h34 M24 24 v34"/>
    <path d="M976 24 h-34 M976 24 v34"/>
    <path d="M24 226 h34 M24 226 v-34"/>
    <path d="M976 226 h-34 M976 226 v-34"/>
  </g>

  <!-- floating particles -->
  <g fill="#22D3EE">
    <circle cx="150" cy="60" r="2.2" opacity="0.7">
      <animate attributeName="cy" values="60;44;60" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="80" r="2.6" fill="#F472B6" opacity="0.7">
      <animate attributeName="cy" values="80;62;80" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="190" r="2" fill="#A78BFA" opacity="0.6">
      <animate attributeName="cy" values="190;176;190" dur="4.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="195" r="1.8" opacity="0.6">
      <animate attributeName="cy" values="195;182;195" dur="5.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- name -->
  <text x="500" y="112" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="66" font-weight="800" letter-spacing="7"
        fill="url(#name)" filter="url(#glow)">RIGON PIRA</text>

  <!-- animated underline -->
  <rect x="290" y="134" width="420" height="3" rx="2" fill="url(#uline)">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="500" y="172" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="19" font-weight="500" letter-spacing="2" fill="#c0caf5">Software Systems Engineer &#160;&#215;&#160; AI &amp; Data Science</text>

  <!-- tags -->
  <text x="500" y="203" text-anchor="middle"
        font-family="'Fira Code', 'Courier New', monospace"
        font-size="13" letter-spacing="1.5" fill="#7aa2f7">AI / ML &#160;·&#160; Data Science &#160;·&#160; .NET &#160;·&#160; Research &#160;·&#160; UBT</text>

  <!-- blinking cursor -->
  <rect x="712" y="150" width="12" height="22" fill="#8B5CF6">
    <animate attributeName="opacity" values="0;0;1;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- sweeping scan light -->
  <rect x="-140" y="0" width="140" height="250" fill="#8B5CF6" opacity="0.06" rx="18">
    <animate attributeName="x" values="-140;1000" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
